<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust - saul project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #f0f0f0;
            --accent-color: #e67e22; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        
        /* Header */
        header {
            background: rgba(0,0,0,0.8);
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            backdrop-filter: blur(10px); border-bottom: 1px solid #222;
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: white; cursor: pointer; }
        .logo i { color: var(--accent-color); margin-right: 8px; }
        .nav-text { color: #ccc; font-weight: 500; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://picsum.photos/seed/travelhero/1920/1080');
            background-size: cover;
            background-position: center;
            padding: 0 20px;
            position: relative;
        }

        .hero-content {
            z-index: 2;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            line-height: 1.2;
        }
        .hero p { font-size: 1.2rem; max-width: 600px; margin-bottom: 3rem; color: #ccc; line-height: 1.6; }
        
        .btn-cta {
            padding: 15px 40px; background-color: var(--accent-color); color: white;
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(230, 126, 34, 0.4); display: inline-block;
            margin-bottom: 2rem;
        }
        .btn-cta:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(230, 126, 34, 0.6); background-color: #d35400; }

        /* --- ADMIN CONTACT CARD --- */
        .admin-contact {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 40px;
            border-radius: 16px;
            display: flex;
            gap: 30px;
            align-items: center;
            animation: slideUp 1s ease;
        }

        .admin-info h4 { margin-bottom: 5px; font-size: 0.9rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }
        .admin-info p { font-size: 0.9rem; color: #ddd; }

        .admin-socials { display: flex; gap: 15px; }
        .social-btn {
            width: 45px; height: 45px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-size: 1.2rem; text-decoration: none; transition: 0.3s;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .social-btn:hover { background: var(--accent-color); transform: translateY(-3px); border-color: var(--accent-color); }
        
        .social-btn.wa:hover { background: #25D366; border-color: #25D366; }
        .social-btn.ig:hover { background: #E1306C; border-color: #E1306C; }
        .social-btn.email:hover { background: #EA4335; border-color: #EA4335; }

        /* Footer */
        footer {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-size: 0.8rem; color: #555;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .admin-contact { flex-direction: column; gap: 15px; padding: 20px; width: 90%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-plane-departure"></i> Wanderlust</div>
        <span class="nav-text">Hello, Traveler!</span>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Explore the World</h1>
            <p>Plan your dream trip, manage your budget, and enjoy unforgettable experiences with us.</p>
            <a href="destinations.html" class="btn-cta">Start Planning <i class="fas fa-arrow-right" style="margin-left: 10px;"></i></a>
        </div>

        <!-- ADMIN CONTACT CARD -->
        <div class="admin-contact">
            <div class="admin-info">
                <h4>Contact Admin</h4>
                <p>Need help? Reach us 24/7</p>
            </div>
            <div class="admin-socials">
                
                <a href="https://wa.me/62881012239839" target="_blank" class="social-btn wa" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                
            
                <a href="https://instagram.com/slwaahaulia_" target="_blank" class="social-btn ig" title="Instagram"><i class="fab fa-instagram"></i></a>

<a href="https://mail.google.com/mail/?view=cm&fs=1&to=salwa.haulia_si25@nusaputra.ac.id&su=Tanya%20Tentang%20Travel" class="social-btn email" title="Email" target="_blank">
    <i class="fas fa-envelope"></i>
</a>
        </div>
    </section>

    <footer>
        &copy; 2026 Wonderlust Travel Project Created by Salwa Haulia
    </footer>

</body>
</html
